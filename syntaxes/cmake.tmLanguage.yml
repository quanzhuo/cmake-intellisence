fileTypes:
  - cmake
  - CMakeLists.txt
name: CMake
scopeName: source.cmake

patterns:
  - include: "#bracket-comment"
  - include: "#line-comment"
  - include: "#bracket-argument"
  - include: "#quoted-string"
  - include: "#generator-expression"
  - include: "#variable-reference"
  - include: "#environment-variable-reference"
  - include: "#cache-variable-reference"
  - include: "#escape"
  - include: "#scoped-condition-command"
  - include: "#scoped-foreach-command"
  - include: "#scoped-command-definition"
  - include: "#scoped-set-command"
  - include: "#command-control"
  - include: "#conditional-control"
  - include: "#loop-control"
  - include: "#block-control"
  - include: "#return-control"
  - include: "#builtin-command"
  - include: "#command-invocation"
  - include: "#boolean"
  - include: "#number"
  - include: "#unquoted-argument"

repository:
  bracket-comment:
    name: comment.block.bracket.cmake
    begin: '#\[(=*)\['
    beginCaptures:
      "0": { name: punctuation.definition.comment.begin.cmake }
    end: '\]\1\]'
    endCaptures:
      "0": { name: punctuation.definition.comment.end.cmake }

  line-comment:
    name: comment.line.number-sign.cmake
    match: '#.*$'

  bracket-argument:
    name: string.quoted.other.cmake
    begin: '\[(=*)\['
    beginCaptures:
      "0": { name: punctuation.definition.string.begin.cmake }
    end: '\]\1\]'
    endCaptures:
      "0": { name: punctuation.definition.string.end.cmake }

  escape:
    name: constant.character.escape.cmake
    match: '\\(.|$)'

  quoted-string:
    name: string.quoted.double.cmake
    begin: '"'
    beginCaptures:
      "0": { name: punctuation.definition.string.begin.cmake }
    end: '"'
    endCaptures:
      "0": { name: punctuation.definition.string.end.cmake }
    patterns:
      - include: "#escape"
      - include: "#generator-expression"
      - include: "#variable-reference"
      - include: "#environment-variable-reference"
      - include: "#cache-variable-reference"

  variable-reference:
    name: variable.other.cmake
    begin: '\$\{'
    beginCaptures:
      "0": { name: punctuation.section.variable.begin.cmake }
    end: '\}'
    endCaptures:
      "0": { name: punctuation.section.variable.end.cmake }
    patterns:
      - include: "#variable-reference"
      - include: "#environment-variable-reference"
      - include: "#cache-variable-reference"

  environment-variable-reference:
    name: variable.other.environment.cmake
    begin: '\$ENV\{'
    beginCaptures:
      "0": { name: punctuation.section.variable.begin.cmake }
    end: '\}'
    endCaptures:
      "0": { name: punctuation.section.variable.end.cmake }
    patterns:
      - include: "#variable-reference"
      - include: "#environment-variable-reference"
      - include: "#cache-variable-reference"

  cache-variable-reference:
    name: variable.other.cache.cmake
    begin: '\$CACHE\{'
    beginCaptures:
      "0": { name: punctuation.section.variable.begin.cmake }
    end: '\}'
    endCaptures:
      "0": { name: punctuation.section.variable.end.cmake }
    patterns:
      - include: "#variable-reference"
      - include: "#environment-variable-reference"
      - include: "#cache-variable-reference"

  generator-expression:
    name: meta.generator-expression.cmake
    begin: '(\$<)([A-Za-z_][A-Za-z0-9_]*)?'
    beginCaptures:
      "1": { name: punctuation.definition.generator-expression.begin.cmake }
      "2": { name: support.function.generator-expression.cmake }
    end: '>'
    endCaptures:
      "0": { name: punctuation.definition.generator-expression.end.cmake }
    patterns:
      - include: "#generator-expression"
      - include: "#variable-reference"
      - include: "#environment-variable-reference"
      - include: "#cache-variable-reference"
      - include: "#escape"

  boolean:
    name: constant.language.boolean.cmake
    match: '\b(?i:ON|YES|TRUE|Y|OFF|NO|FALSE|N|IGNORE|NOTFOUND|[A-Za-z_][A-Za-z0-9_]*-NOTFOUND)\b'

  number:
    name: constant.numeric.cmake
    match: '(?<![A-Za-z0-9_.])[-+]?(?:\d+(?:\.\d*)?|\.\d+)(?:[eE][-+]?\d+)?(?![A-Za-z0-9_.])'

  unquoted-argument:
    match: '(?:\$(?!\{|ENV\{|CACHE\{|<)|[^\s()#"$\\])+'

  common-argument-patterns:
    patterns:
      - include: "#bracket-comment"
      - include: "#line-comment"
      - include: "#bracket-argument"
      - include: "#quoted-string"
      - include: "#generator-expression"
      - include: "#variable-reference"
      - include: "#environment-variable-reference"
      - include: "#cache-variable-reference"
      - include: "#escape"
      - include: "#boolean"
      - include: "#number"

  nested-parentheses:
    begin: '\('
    beginCaptures:
      "0": { name: punctuation.section.arguments.begin.cmake }
    end: '\)'
    endCaptures:
      "0": { name: punctuation.section.arguments.end.cmake }
    patterns:
      - include: "#nested-parentheses"
      - include: "#common-argument-patterns"
      - include: "#unquoted-argument"

  conditional-operator:
    name: keyword.operator.wordlike.cmake
    match: '\b(?i:NOT|AND|OR|COMMAND|POLICY|TARGET|TEST|DEFINED|IN_LIST|EXISTS|IS_READABLE|IS_WRITABLE|IS_EXECUTABLE|IS_ABSOLUTE|IS_DIRECTORY|IS_SYMLINK|IS_NEWER_THAN|MATCHES|LESS|GREATER|EQUAL|LESS_EQUAL|GREATER_EQUAL|STRLESS|STRGREATER|STREQUAL|STRLESS_EQUAL|STRGREATER_EQUAL|VERSION_LESS|VERSION_GREATER|VERSION_EQUAL|VERSION_LESS_EQUAL|VERSION_GREATER_EQUAL|PATH_EQUAL)\b'

  nested-condition-parentheses:
    begin: '\('
    beginCaptures:
      "0": { name: punctuation.section.arguments.begin.cmake }
    end: '\)'
    endCaptures:
      "0": { name: punctuation.section.arguments.end.cmake }
    patterns:
      - include: "#nested-condition-parentheses"
      - include: "#common-argument-patterns"
      - include: "#conditional-operator"
      - include: "#unquoted-argument"

  scoped-condition-command:
    begin: '^\s*\b(?i:(if|elseif)|(while))\b\s*(\()'
    beginCaptures:
      "1": { name: keyword.control.conditional.cmake }
      "2": { name: keyword.control.loop.cmake }
      "3": { name: punctuation.section.arguments.begin.cmake }
    end: '\)'
    endCaptures:
      "0": { name: punctuation.section.arguments.end.cmake }
    patterns:
      - include: "#nested-condition-parentheses"
      - include: "#common-argument-patterns"
      - include: "#conditional-operator"
      - include: "#unquoted-argument"

  scoped-foreach-command:
    begin: '^\s*\b(?i:(foreach))\b\s*(\()'
    beginCaptures:
      "1": { name: keyword.control.loop.cmake }
      "2": { name: punctuation.section.arguments.begin.cmake }
    end: '\)'
    endCaptures:
      "0": { name: punctuation.section.arguments.end.cmake }
    patterns:
      - include: "#nested-parentheses"
      - include: "#common-argument-patterns"
      - name: keyword.other.cmake
        match: '\b(?i:IN|RANGE|ZIP_LISTS|LISTS|ITEMS)\b'
      - include: "#unquoted-argument"

  scoped-command-definition:
    begin: '^\s*\b(?i:(function)|(macro))\b\s*(\()\s*([A-Za-z_][A-Za-z0-9_]*)?'
    beginCaptures:
      "1": { name: keyword.control.command.cmake }
      "2": { name: keyword.control.command.cmake }
      "3": { name: punctuation.section.arguments.begin.cmake }
      "4": { name: entity.name.function.cmake }
    end: '\)'
    endCaptures:
      "0": { name: punctuation.section.arguments.end.cmake }
    patterns:
      - include: "#nested-parentheses"
      - name: variable.parameter.cmake
        match: '\b[A-Za-z_][A-Za-z0-9_]*\b'
      - include: "#common-argument-patterns"
      - include: "#unquoted-argument"

  scoped-set-command:
    begin: '\b(?i:(set|unset))\b\s*(\()\s*(?:((?i:CACHE)\{([^}]*)\})|((?i:ENV)\{([^}]*)\})|([A-Za-z_][A-Za-z0-9_]*))?'
    beginCaptures:
      "1": { name: support.function.cmake }
      "2": { name: punctuation.section.arguments.begin.cmake }
      "3": { name: variable.other.cache.cmake }
      "5": { name: variable.other.environment.cmake }
      "7": { name: variable.other.cmake }
    end: '\)'
    endCaptures:
      "0": { name: punctuation.section.arguments.end.cmake }
    patterns:
      - include: "#nested-parentheses"
      - include: "#common-argument-patterns"
      - name: keyword.other.cmake
        match: '\b(?i:CACHE|PARENT_SCOPE|FORCE|TYPE|HELP|VALUE|BOOL|STRING|FILEPATH|PATH|INTERNAL)\b'
      - include: "#unquoted-argument"

  command-control:
    name: keyword.control.command.cmake
    match: '^\s*\b(?i:function|endfunction|macro|endmacro)\b'

  conditional-control:
    name: keyword.control.conditional.cmake
    match: '^\s*\b(?i:if|elseif|else|endif)\b'

  loop-control:
    name: keyword.control.loop.cmake
    match: '^\s*\b(?i:foreach|endforeach|while|endwhile|break|continue)\b'

  block-control:
    name: keyword.control.block.cmake
    match: '^\s*\b(?i:block|endblock)\b'

  return-control:
    name: keyword.control.return.cmake
    match: '^\s*\b(?i:return)\b'

  builtin-command:
    name: support.function.cmake
    # Replaced at build time from server/src/builtin-cmds.json.
    match: __CMAKE_BUILTIN_COMMAND_PATTERN__

  command-invocation:
    name: entity.name.function.cmake
    match: '\b[A-Za-z_][A-Za-z0-9_]*\b(?=\s*\()'
